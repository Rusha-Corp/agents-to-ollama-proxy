apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama-proxy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:FAenX/agents-to-ollama-proxy.git
    targetRevision: main
    path: k8s/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: ollama-proxy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
